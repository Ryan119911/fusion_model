data:
  trajectory_csv: tests/fixtures/character_smoke.csv
  image_dir: tests/fixtures/missing_images
  json_dir: tests/fixtures/missing_json
  character_trajectory_padding: 4

train:
  output_dir: outputs/character_smoke
  batch_size: 2
  epochs: 1
  lr: 0.0003
  weight_decay: 0.000001
  num_workers: 0
  save_interval: 1
  seed: 42
  device: cpu

character_generator:
  input_channels: 6
  base_channels: 8
  out_channels: 1
  image_size: 32
  depth: 3
  dropout: 0.0
  use_tanh: false
  prior_strength: 0.75
  prior_channel: 1
  prior_threshold: 0.70
  prior_sharpness: 10.0
